<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>A Creator — ASCII Cat Runner</title>
<style>
  :root { 
    --bg: #000; 
    --fg: #f2f2f2; 
    --dim: #666; 
    --accent: #fff;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; min-height: 100%; background: var(--bg); color: var(--fg); }
  body { 
    display: flex; 
    flex-direction: column; 
    align-items: center; 
    justify-content: center; 
    font-family: "IBM Plex Mono", "Courier New", monospace; 
    padding: 40px 20px;
    overflow-x: hidden;
  }

  /* 顶部图片文案区域 */
  .header-section {
    width: min(920px, 94vw);
    margin-bottom: 50px;
    text-align: left;
    user-select: none;
  }
  .whoami {
    font-size: 16px;
    color: var(--dim);
    margin-bottom: 24px;
    letter-spacing: 0.05em;
  }
  .main-quote {
    font-size: clamp(24px, 4.5vw, 42px);
    font-weight: 700;
    line-height: 1.35;
    color: var(--fg);
    margin: 0 0 28px 0;
    letter-spacing: -0.02em;
  }
  .sub-tag {
    font-size: 14px;
    color: var(--dim);
    letter-spacing: 0.04em;
  }

  /* 视觉分隔线 */
  .divider {
    width: min(920px, 94vw);
    height: 1px;
    background: #1c1c1c;
    margin-bottom: 40px;
  }

  /* 游戏主容器 */
  #game { position: relative; width: min(920px, 94vw); height: 260px; background: #000; border: 1px solid #222; overflow: hidden; user-select: none; cursor: default; }
  .line { position: absolute; left: 0; right: 0; bottom: 62px; height: 1px; background: #eee; opacity: .86; }
  .hint { position: absolute; left: 14px; bottom: 12px; color: #555; font-size: 12px; letter-spacing: .04em; }
  .counter { position: absolute; right: 14px; bottom: 12px; color: #555; font-size: 12px; letter-spacing: .04em; }
  .entity { position: absolute; white-space: pre; font-size: 22px; line-height: 1.08; color: #fff; transform: translateZ(0); }
  #cat { left: 48px; bottom: 64px; font-size: 22px; z-index: 3; transition: bottom .08s linear, left .12s linear; }
  .obstacle { z-index: 2; text-align: left; cursor: pointer; }
  .mail { font-size: 21px; line-height: 1.12; animation: jitter .05s infinite alternate; }
  .rabbit { font-size: 23px; line-height: 1.04; animation: shake .13s infinite alternate; }
  .human { font-size: 24px; line-height: 1.03; animation: wave .18s infinite alternate; }
  .car { font-size: 21px; line-height: 1.02; animation: shake .08s infinite alternate; }
  .home { font-size: 26px; z-index: 1; opacity: 0; transition: opacity 1.2s ease; }
  .home.show { opacity: 1; }
  .speech { position: absolute; white-space: pre; font-size: 16px; color: #fff; z-index: 5; pointer-events: none; opacity: 0; animation: speechShake .22s infinite alternate; transition: opacity .9s ease; letter-spacing: .08em; }
  .speech.show { opacity: 1; }
  .pop { font-size: 24px; animation: pop .38s ease-out forwards; pointer-events: none; }
  .clickHint { position: absolute; white-space: pre; font-size: 13px; line-height: 1.05; color: #fff; z-index: 4; pointer-events: none; text-align: center; animation: hintShake .09s infinite alternate; letter-spacing: .04em; }
  .hit { animation: hit .07s 1; }
  .end { position: absolute; inset: 0; display: none; place-items: center; color: #fff; font-size: 18px; background: rgba(0,0,0,.45); letter-spacing: .08em; z-index: 9; }
  
  /* 音符飘落动效 */
  .note { position: absolute; color: #fff; font-size: 18px; pointer-events: none; z-index: 6; animation: noteFloat 1.1s ease-out forwards; }
  
  @keyframes jitter { from{transform:translate(-4px,-2px) rotate(-4deg)} to{transform:translate(4px,2px) rotate(4deg)} }
  @keyframes shake { from{transform:translateX(-1px)} to{transform:translateX(1px)} }
  @keyframes wave { from{transform:rotate(-1deg)} to{transform:rotate(1deg)} }
  @keyframes hintShake { from{transform:translate(-1px,-1px)} to{transform:translate(1px,1px)} }
  @keyframes pop { 0%{opacity:1; transform:scale(.7)} 70%{opacity:1; transform:scale(1.25)} 100%{opacity:0; transform:scale(1.6)} }
  @keyframes hit { from{filter:invert(1)} to{filter:invert(0)} }
  @keyframes speechShake { from{transform:translateY(-1px)} to{transform:translateY(1px)} }
  @keyframes noteFloat { 0%{opacity:1;transform:translate(0,0) rotate(-8deg)} 100%{opacity:0;transform:translate(14px,-46px) rotate(12deg)} }
</style>
</head>
<body>

  <header class="header-section">
    <div class="whoami">&gt; whoami</div>
    <h1 class="main-quote">
      A creator who turns "I've<br>
      never done this" into<br>
      "Here's how I built it."
    </h1>
    <div class="sub-tag">— powered by AI, across languages and cultures.</div>
  </header>

  <div class="divider"></div>

  <main id="game" aria-label="ASCII cat runner game">
    <div class="line"></div>
    <pre id="cat" class="entity"> /\_/\\
( •.• )
 / &gt;</pre>
    <pre id="homeFish" class="entity home">&gt;&lt;)))°&gt;</pre>
    <div id="homeSpeech" class="speech">back home...</div>
    <div id="end" class="end"></div>
    <div class="hint">click each thing 10x · SPACE / ↑ jump · R reset</div>
    <div id="counter" class="counter"></div>
  </main>

<script>
(() => {
  const game = document.getElementById('game');
  
  // 移动端/窄屏拦截拦截机制
  if (window.matchMedia('(pointer: coarse)').matches || window.innerWidth < 600) {
    game.innerHTML = '<div style="color:#fff;display:grid;place-items:center;height:100%;font-size:18px;letter-spacing:.08em;text-align:center;line-height:1.8">ฅ^•ﻌ•^ฅ<br><span style="font-size:13px;color:#aaa">open on desktop for a surprise</span></div>';
    return;
  }

  const cat = document.getElementById('cat');
  const end = document.getElementById('end');
  const counter = document.getElementById('counter');
  const homeFish = document.getElementById('homeFish');
  const homeSpeech = document.getElementById('homeSpeech');

  const CAT_NORMAL = ' /\\_/\\\\\n( •.• )\n / >';
  const CAT_DIZZY  = ' /\\_/\\\\\n( x.x )\n / >💫';
  const CAT_HAPPY  = ' /\\_/\\\\\n( ^.^ )\n / >🐟';

  // 障碍配置
  const specs = [
    { type:'rabbit', html:' (\\_/)\n(◣_◢)\n \\vv/',                   speed:2.38, bottom:66, gap:940 },
    { type:'car',    html:' __/[]\\__\n  O----O',                     speed:3.18, bottom:68, gap:760 },
    { type:'mail',   html:'[MAIL]\n !!!\n RE:',                       speed:2.05, bottom:70, gap:620 },
    { type:'human',  html:'  ♥\n \\o/  pspsps~\n  |\n / \\',          speed:2.18, bottom:64, gap:0 }
  ];

  let frame = 0;
  let current = null;
  let clickHint = null;
  let index = -1;
  let running = true;
  let catY = 64;
  let catX = 48;
  let vy = 0;
  let jumping = false;
  let dizzy = false;
  let goingHome = false;
  let goalReached = false;
  let nextTimer = null;
  let finishX = 760;

  function setFishPosition() {
    finishX = Math.max(680, game.clientWidth - 130);
    homeFish.style.left = finishX + 'px';
    homeFish.style.bottom = '76px';
  }

  function reset() {
    document.querySelectorAll('.obstacle,.pop,.clickHint,.note').forEach(e => e.remove());
    clearTimeout(nextTimer);
    frame = 0; index = -1; current = null; clickHint = null; running = true;
    catY = 64; catX = 48; vy = 0; jumping = false; dizzy = false; goingHome = false; goalReached = false;
    cat.textContent = CAT_NORMAL; cat.style.bottom = catY + 'px'; cat.style.left = catX + 'px';
    end.style.display = 'none'; counter.textContent = '';
    homeFish.classList.remove('show');
    homeSpeech.classList.remove('show');
    setFishPosition();
    scheduleNext(520);
  }

  function scheduleNext(delay) {
    clearTimeout(nextTimer);
    nextTimer = setTimeout(spawnNext, delay);
  }

  function spawnNext() {
    if (!running || dizzy || goalReached || goingHome) return;
    index += 1;
    if (index >= specs.length) {
      startGoingHome();
      return;
    }
    const spec = specs[index];
    const el = document.createElement('pre');
    el.className = 'entity obstacle ' + spec.type;
    el.textContent = spec.html;
    el.dataset.type = spec.type;
    el.dataset.x = String(game.clientWidth + 44);
    el.dataset.speed = String(spec.speed);
    el.dataset.clicksLeft = '10';
    el.dataset.gap = String(spec.gap);
    el.style.left = (game.clientWidth + 44) + 'px';
    el.style.bottom = spec.bottom + 'px';
    game.appendChild(el);
    current = el;

    clickHint = document.createElement('pre');
    clickHint.className = 'clickHint';
    clickHint.textContent = '↓\nclick that';
    game.appendChild(clickHint);
    updateClickHint();
    updateCounter(el);

    el.addEventListener('click', (ev) => {
      ev.stopPropagation();
      const left = Math.max(0, Number(el.dataset.clicksLeft) - 1);
      el.dataset.clicksLeft = String(left);
      el.classList.remove('hit'); void el.offsetWidth; el.classList.add('hit');
      updateCounter(el);
      if (left <= 0) {
        explode(el);
        removeClickHint();
        current = null;
        counter.textContent = '';
        if (index >= specs.length - 1) startGoingHome();
        else scheduleNext(Number(spec.gap));
      }
    });
  }

  function updateClickHint() {
    if (!current || !clickHint) return;
    const x = Number(current.dataset.x);
    clickHint.style.left = (x + 6) + 'px';
    clickHint.style.bottom = (parseFloat(current.style.bottom) + current.offsetHeight + 26) + 'px';
  }

  function removeClickHint() {
    if (clickHint) clickHint.remove();
    clickHint = null;
  }

  function updateCounter(el) {
    if (!el) { counter.textContent = ''; return; }
    counter.textContent = `${el.dataset.type.toUpperCase()} ${10 - Number(el.dataset.clicksLeft)}/10`;
  }

  function explode(el) {
    const r = el.getBoundingClientRect();
    const gr = game.getBoundingClientRect();
    const pop = document.createElement('pre');
    pop.className = 'entity pop';
    pop.textContent = '* POP *';
    pop.style.left = (r.left - gr.left + r.width / 2 - 42) + 'px';
    pop.style.top = (r.top - gr.top + r.height / 2 - 14) + 'px';
    game.appendChild(pop);
    el.remove();
    setTimeout(() => pop.remove(), 450);
  }

  function jump() {
    if (dizzy || goalReached) return;
    if (!jumping) { jumping = true; vy = 9.2; }
  }

  // 音符生成
  function spawnNote() {
    const n = document.createElement('div');
    n.className = 'note';
    n.textContent = Math.random() < 0.5 ? '♪' : '♫';
    n.style.left = (catX + 18 + (Math.random()*16-8)) + 'px';
    n.style.bottom = (catY + 56 + (Math.random()*8)) + 'px';
    game.appendChild(n);
    setTimeout(() => n.remove(), 1100);
  }

  function rectsOverlap(a,b) {
    return !(a.right < b.left || a.left > b.right || a.bottom < b.top || a.top > b.bottom);
  }

  function faint() {
    if (dizzy || goalReached) return;
    dizzy = true; running = false; goingHome = false; clearTimeout(nextTimer);
    removeClickHint();
    cat.textContent = CAT_DIZZY;
    counter.textContent = 'DIZZY';
    setTimeout(reset, 1200);
  }

  function startGoingHome() {
    if (goalReached || dizzy) return;
    clearTimeout(nextTimer);
    removeClickHint();
    current = null;
    goingHome = true;
    running = true;
    counter.textContent = '';
    setTimeout(() => homeFish.classList.add('show'), 360);
  }

  // 修改：触发通关时关闭 goingHome 状态，让小猫精确锁定停在小鱼干旁
  function win() {
    goalReached = true; 
    running = false; 
    goingHome = false; 
    clearTimeout(nextTimer);
    cat.textContent = CAT_HAPPY;
    counter.textContent = '';
    positionSpeech();
    homeSpeech.classList.add('show');
  }

  function positionSpeech() {
    const cr = cat.getBoundingClientRect();
    const gr = game.getBoundingClientRect();
    homeSpeech.style.left = (cr.left - gr.left - 18) + 'px';
    homeSpeech.style.bottom = (parseFloat(cat.style.bottom || '64') + cat.offsetHeight + 16) + 'px';
  }

  function loop() {
    frame++;

    if (jumping) {
      catY += vy;
      vy -= 0.55;
      if (catY <= 64) { catY = 64; vy = 0; jumping = false; }
      cat.style.bottom = catY + 'px';
    }

    if (running && current) {
      let x = Number(current.dataset.x) - Number(current.dataset.speed);
      current.dataset.x = String(x);
      current.style.left = x + 'px';
      updateClickHint();

      if (rectsOverlap(cat.getBoundingClientRect(), current.getBoundingClientRect())) faint();

      if (x < -180) {
        const gap = Number(current.dataset.gap || 700);
        current.remove(); removeClickHint(); current = null; counter.textContent = '';
        if (index >= specs.length - 1) startGoingHome();
        else scheduleNext(gap);
      }
    }

    // 回家缓动加速、蹦跳与飘落音符逻辑
    if (goingHome && !goalReached) {
      catX += 1.8 + Math.min(2.6, (catX - 48) * 0.005);
      cat.style.left = catX + 'px';
      
      if (!jumping && frame % 26 === 0) jump();
      if (frame % 11 === 0) spawnNote();
      
      positionSpeech();
      
      // 精准到达判定：当小猫接触到终点小鱼的位置时停下
      if (catX >= finishX - 90) {
        win();
      }
    }

    requestAnimationFrame(loop);
  }

  window.addEventListener('keydown', (e) => {
    if (e.code === 'Space' || e.code === 'ArrowUp') { e.preventDefault(); jump(); }
    if (e.key.toLowerCase() === 'r') reset();
  });
  game.addEventListener('click', jump);
  window.addEventListener('resize', setFishPosition);

  reset();
  loop();
})();
</script>
</body>
</html>
